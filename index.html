<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milagro Stock 360 - Dashboard Profissional</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --primary: #2c3e50; 
            --accent: #3498db; --success: #27ae60; --danger: #e74c3c;
            --text: #34495e; --muted: #95a5a6;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .container { max-width: 1300px; margin: auto; padding: 20px; }

        /* HEADER E LOGIN */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .login-box { display: flex; gap: 10px; align-items: center; }
        .login-box input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 6px; outline: none; }

        /* DASHBOARD CARDS */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: transform 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .card p { font-size: 1.8rem; font-weight: 700; margin: 10px 0 0; color: var(--primary); }
        .card i { position: absolute; right: 20px; bottom: 20px; font-size: 2.5rem; opacity: 0.1; }

        /* SEÇÕES */
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .section { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .section h2 { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        
        /* FORMULÁRIOS */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        
        /* TABELAS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--muted); font-size: 0.8rem; border-bottom: 2px solid var(--bg); }
        td { padding: 15px 12px; border-bottom: 1px solid var(--bg); font-size: 0.95rem; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        
        .admin-only { display: none; }
        @media (max-width: 900px) { .grid-main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="top-bar">
        <div style="display:flex; align-items:center; gap:12px">
            <i class="fas fa-microchip" style="font-size: 1.8rem;"></i>
            <h1 style="margin:0; font-size: 1.4rem;">MILAGRO <span style="font-weight: 300;">STOCK 360</span></h1>
        </div>
        <div id="login-area" class="login-box">
            <input type="password" id="senha" placeholder="Acesso Gestor">
            <button onclick="logar()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;"><i class="fas fa-lock"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <div class="card" style="border-top: 5px solid var(--accent)">
            <h3>Itens Ativos</h3><p id="dash-itens">0</p><i class="fas fa-boxes-stacked"></i>
        </div>
        <div class="card" style="border-top: 5px solid var(--success)">
            <h3>Valor em Estoque</h3><p id="dash-financeiro">R$ 0,00</p><i class="fas fa-wallet"></i>
        </div>
        <div class="card" style="border-top: 5px solid var(--danger)">
            <h3>Alertas de Compra</h3><p id="dash-alertas">0</p><i class="fas fa-triangle-exclamation"></i>
        </div>
    </div>

    <div class="grid-main">
        <div class="column">
            <div class="section admin-only">
                <h2><i class="fas fa-plus-circle"></i> Catálogo de Produtos</h2>
                <div class="form-row">
                    <input type="text" id="cad-nome" placeholder="Nome do Produto">
                    <select id="cad-un"><option>Kg</option><option>Unidade</option><option>Litro</option></select>
                </div>
                <div class="form-row">
                    <input type="text" id="cad-preco" placeholder="Preço de Custo (R$)">
                    <input type="number" id="cad-min" placeholder="Estoque de Segurança">
                </div>
                <button class="btn-action" style="background:var(--success)" onclick="cadastrar()">CADASTRAR NO SISTEMA</button>
            </div>

            <div class="section">
                <h2><i class="fas fa-truck-ramp-box"></i> Lançar Movimentação</h2>
                <select id="mov-item" style="margin-bottom:15px"><option value="">Selecione o produto...</option></select>
                <div class="form-row">
                    <select id="mov-tipo">
                        <option value="entrada" style="color:var(--success)">ENTRADA (+)</option>
                        <option value="saida" style="color:var(--danger)">SAÍDA (-)</option>
                    </select>
                    <input type="number" id="mov-qtd" placeholder="Quantidade">
                </div>
                <button class="btn-action" style="background:var(--accent)" onclick="lancarMovimentacao()">CONFIRMAR LANÇAMENTO</button>
            </div>
        </div>

        <div class="column">
            <div class="section">
                <h2><i class="fas fa-history"></i> Últimas Atividades</h2>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table style="font-size: 0.85rem;">
                        <tbody id="lista-historico"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-list-check"></i> Inventário de Estoque Atual</h2>
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Nível</th>
                    <th>Saldo</th>
                    <th>Valorização</th>
                    <th class="admin-only">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-estoque"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALJOAPzmil3tTmv6f3kMGYQX1Oc61t0F4",
        authDomain: "milagro-172c5.firebaseapp.com",
        databaseURL: "https://milagro-172c5-default-rtdb.firebaseio.com",
        projectId: "milagro-172c5",
        storageBucket: "milagro-172c5.firebasestorage.app",
        appId: "1:923027654375:web:d9e24bec8e48d304438442"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const CHAVE = "MILAGRO2026";
    let isAdmin = false;

    function logar() {
        if(document.getElementById('senha').value === "Milagro@Admin2026") {
            isAdmin = true;
            document.querySelectorAll('.admin-only').forEach(e => e.style.display = (e.tagName === 'TH' || e.tagName === 'TD') ? 'table-cell' : 'block');
            document.getElementById('login-area').innerHTML = "<span style='color:#2ecc71; font-weight:bold;'><i class='fas fa-user-shield'></i> GESTOR ATIVO</span>";
        } else { alert("Senha incorreta!"); }
    }

    function cadastrar() {
        const nome = document.getElementById('cad-nome').value;
        const preco = parseFloat(document.getElementById('cad-preco').value.replace(',', '.')) || 0;
        if(!nome) return alert("Digite o nome!");
        
        db.ref('estoque/').push({
            nome, un: document.getElementById('cad-un').value, 
            preco, min: parseInt(document.getElementById('cad-min').value) || 0,
            qtd: 0, chave_seguranca: CHAVE 
        }).then(() => {
            alert("Produto registrado no catálogo!");
            document.getElementById('cad-nome').value = "";
        });
    }

    function lancarMovimentacao() {
        const id = document.getElementById('mov-item').value;
        const qtdMov = parseFloat(document.getElementById('mov-qtd').value) || 0;
        const tipo = document.getElementById('mov-tipo').value;
        if(!id || qtdMov <= 0) return alert("Dados inválidos!");

        db.ref('estoque/' + id).once('value', (s) => {
            const i = s.val();
            let novaQtd = tipo === 'entrada' ? (i.qtd + qtdMov) : (i.qtd - qtdMov);
            if(novaQtd < 0) return alert("Saldo insuficiente!");

            // Atualiza Estoque
            db.ref('estoque/' + id).update({ qtd: novaQtd, chave_seguranca: CHAVE });
            
            // Registra Histórico
            db.ref('historico/').push({
                produto: i.nome,
                tipo: tipo,
                qtd: qtdMov,
                data: new Date().toLocaleString('pt-BR'),
                chave_seguranca: CHAVE
            });

            alert("Movimentação registrada!");
            document.getElementById('mov-qtd').value = "";
        });
    }

    function removerItem(id) {
        if(confirm("Deseja deletar este produto?")) db.ref('estoque/' + id).remove();
    }

    // LISTENER ESTOQUE
    db.ref('estoque/').on('value', (snap) => {
        const dados = snap.val();
        const tb = document.getElementById('tabela-estoque');
        const sel = document.getElementById('mov-item');
        tb.innerHTML = ''; sel.innerHTML = '<option value="">Selecione o produto...</option>';
        let tFin = 0, tItens = 0, tAlerta = 0;

        for(let id in dados) {
            let i = dados[id];
            sel.innerHTML += `<option value="${id}">${i.nome}</option>`;

            if(i.qtd > 0) {
                tItens++;
                let sub = i.qtd * i.preco; tFin += sub;
                let critico = i.qtd <= i.min;
                if(critico) tAlerta++;

                tb.innerHTML += `
                    <tr>
                        <td><strong>${i.nome}</strong><br><small style="color:var(--muted)">${i.un}</small></td>
                        <td style="width:120px">
                            <div style="height:6px; background:#eee; border-radius:10px">
                                <div style="height:100%; width:${Math.min((i.qtd/i.min)*50, 100)}%; background:${critico ? 'var(--danger)' : 'var(--success)'}; border-radius:10px"></div>
                            </div>
                            <small style="font-size:0.7rem">${critico ? 'REPOR URGENTE' : 'OK'}</small>
                        </td>
                        <td><b>${i.qtd}</b></td>
                        <td style="font-weight:bold; color:var(--primary)">R$ ${sub.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                        <td class="admin-only"><button onclick="removerItem('${id}')" style="background:none; border:none; color:var(--danger); cursor:pointer"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            }
        }
        document.getElementById('dash-itens').innerText = tItens;
        document.getElementById('dash-financeiro').innerText = "R$ " + tFin.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('dash-alertas').innerText = tAlerta;
    });

    // LISTENER HISTÓRICO
    db.ref('historico/').limitToLast(10).on('value', (snap) => {
        const hist = snap.val();
        const hTable = document.getElementById('lista-historico');
        hTable.innerHTML = '';
        let lista = [];
        for(let id in hist) lista.unshift(hist[id]); // Inverte para o mais novo vir primeiro

        lista.forEach(h => {
            let cor = h.tipo === 'entrada' ? 'var(--success)' : 'var(--danger)';
            let icon = h.tipo === 'entrada' ? 'fa-arrow-up' : 'fa-arrow-down';
            hTable.innerHTML += `
                <tr>
                    <td><i class="fas ${icon}" style="color:${cor}"></i></td>
                    <td><b>${h.produto}</b><br><small>${h.data}</small></td>
                    <td style="text-align:right"><span class="badge" style="background:${cor}22; color:${cor}">${h.tipo === 'entrada' ? '+' : '-'}${h.qtd}</span></td>
                </tr>`;
        });
    });
</script>
</body>
</html>
